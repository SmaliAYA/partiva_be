version: '3.8'

services:

  # ── PHP / Laravel ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: partiva_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - partiva_network
    depends_on:
      - db

  # ── Nginx ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: partiva_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - partiva_network
    depends_on:
      - app

  # ── MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: partiva_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: partiva
      MYSQL_USER: partiva_user
      MYSQL_PASSWORD: partiva_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - partiva_db_data:/var/lib/mysql
    networks:
      - partiva_network

  # ── phpMyAdmin ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: partiva_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: partiva_user
      PMA_PASSWORD: partiva_pass
    networks:
      - partiva_network
    depends_on:
      - db

networks:
  partiva_network:
    driver: bridge

volumes:
  partiva_db_data:
    driver: local