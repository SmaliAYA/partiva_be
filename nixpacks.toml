[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.json", "php83Extensions.bcmath", "php83Extensions.openssl", "php83Extensions.curl", "composer"]

[phases.build]
cmds = ["composer update --no-dev --optimize-autoloader --no-interaction", "composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.deploy]
cmds = ["php artisan migrate --force", "php artisan config:cache", "php artisan route:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"